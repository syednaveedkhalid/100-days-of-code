<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mera Developer Profile</title>
    <style>
        /* Day 4: Body styling (Background & Fonts) */
        body {
            background-color: #eef2f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Day 4 & 5: Card styling (Shadow, Padding, Borders) */
        .profile-card {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Day 1: Profile Image styling */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Image ko bilkul gol (circle) karne ke liye */
            border: 4px solid #1877f2;
            object-fit: cover;
        }

        /* Day 6: Class styling for heading */
        .name {
            font-size: 24px;
            color: #1877f2;
            margin: 15px 0 5px 0;
        }

        .title {
            color: #777;
            font-size: 16px;
            margin-bottom: 20px;
        }

        /* Day 2: List styling inside card */
        .skills-list {
            text-align: left;
            background-color: #f9f9f9;
            padding: 15px 15px 15px 35px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        /* Day 7: Inline to Block Conversion for Button */
        .btn-contact {
            display: block;
            background-color: #1877f2;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }

        /* Mouse le jaane par button ka rang thoda dark ho jaye */
        .btn-contact:hover {
            background-color: #145dbf;
        }
    </style>
</head>
<body>

    <!-- Main Container -->
    <div class="profile-card">
        <!-- Profile Picture (Day 1) -->
        <img class="profile-img" src="https://picsum.photos/200" alt="Profile Picture">
        
        <!-- Headings & Text (Day 1) -->
        <h1 class="name">Syed Naveed Khalid</h1>
        <p class="title">Future MERN Stack Developer 🚀</p>
        
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <!-- Skills List (Day 2 & Day 6) -->
        <h3 style="text-align: left; margin-bottom: 10px;">Meri Skills:</h3>
        <ul class="skills-list">
            <!-- Yahan ab kuch nahi likhna, JS khud daalegi -->
        </ul>

        <!-- Action Button (Day 1 & Day 7) -->
        <a class="btn-contact" id="myBtn" href="#">Mera GitHub Profile</a>
    </div>
    <!-- JavaScript Code yahan se shuru hota hai -->
    <script>
        // 1. Apni skills ka ek Array banaya
        let mySkills = ["HTML5 (Structure)", "CSS3 (Designing)", "JavaScript (Logic)", "Arrays & Loops", "DOM Magic 🪄"];

        // 2. Webpage se us khali list (ul) ko dhoond kar pakda
        const ulList = document.querySelector('.skills-list');

        // 3. For Loop lagaya jo hamari har skill par ek ek karke jayega
        for (let i = 0; i < mySkills.length; i++) {
            
            // Har skill ke liye hum ek naya <li> tag HTML ka dabba banayenge
            let newLi = document.createElement('li');
            
            // Us naye dabbe ke andar skill ka naam likhenge
            newLi.innerHTML = mySkills[i];
            
            // Aur us dabbe ko apni main khali list (ul) ke andar daal (append) denge
            ulList.appendChild(newLi);
        }
    </script>
</body>
</html>
